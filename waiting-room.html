<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AI Dad Jokes — Waiting Room</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#FFF;font-family:'Inter',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sq{position:absolute;top:24px;right:30px;font-weight:900;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#FFF;}
.top-line{position:absolute;top:30px;left:40px;color:#555;font-size:13px;font-weight:600;}
.joke-container{text-align:center;max-width:800px;padding:0 40px;}
.setup{font-family:'Bebas Neue','Impact',sans-serif;font-size:3.2em;text-transform:uppercase;letter-spacing:0.02em;line-height:1.05;opacity:0;transform:translateY(20px);animation:fadeUp 0.6s ease forwards;}
.punchline{font-size:1.4em;color:#4A8FE7;font-weight:700;margin-top:24px;opacity:0;animation:fadeUp 0.6s ease forwards 2.5s;}
.emoji{font-size:3em;margin-top:20px;opacity:0;animation:fadeUp 0.4s ease forwards 3.5s;}
.counter{position:absolute;bottom:30px;left:40px;color:#333;font-size:12px;}
.hint{position:absolute;bottom:30px;right:40px;color:#333;font-size:12px;}
.progress{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#4A8FE7,#4EC971);animation:fillBar var(--duration) linear forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
@keyframes fillBar{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div class="sq">SQUIRE</div>
<div class="top-line">Claude Code Workshop — Starting soon...</div>
<div class="joke-container" id="joke">
  <div class="setup" id="setup"></div>
  <div class="punchline" id="punchline"></div>
  <div class="emoji" id="emoji"></div>
</div>
<div class="counter" id="counter"></div>
<div class="hint">while (waiting) { laugh(); }</div>
<div class="progress" id="progress" style="--duration:12s;"></div>

<script>
const jokes = [
  {s:"I asked my AI to act human.", p:"It started procrastinating.", e:"😴"},
  {s:"Why was the computer cold?", p:"It left its Windows open.", e:"🥶"},
  {s:"I trained an AI on 1,000 hours of dad jokes.", p:"It gained sentience and left.", e:"🚪"},
  {s:"Why do programmers prefer dark mode?", p:"Because light attracts bugs.", e:"🪲"},
  {s:"I told my AI to be more creative.", p:'It wrote "I quit" in 47 different fonts.', e:"🎨"},
  {s:"How does AI take a nap?", p:"It goes into sleep mode.", e:"💤"},
  {s:"What's a robot's favorite type of music?", p:"Heavy metal.", e:"🤘"},
  {s:"I opened an AI startup.", p:"So far it's mostly buzzwords and coffee.", e:"☕"},
  {s:"Why did the developer go broke?", p:"Because he used up all his cache.", e:"💸"},
  {s:"What did the AI say after a long conversation?", p:"Sorry, I forgot what we were talking about.", e:"😅"},
  {s:"Why don't robots ever panic?", p:"They have nerves of steel.", e:"🤖"},
  {s:"How does a computer get drunk?", p:"It takes screenshots.", e:"📸"},
  {s:"What do you call a computer that sings?", p:"A-Dell.", e:"🎤"},
  {s:"Why did the AI cross the road?", p:"Because the human asked it to optimize the route.", e:"🐔"},
  {s:"What's an AI's favorite snack?", p:"Microchips.", e:"🍟"},
  {s:"Debugging: being the detective in a crime movie...", p:"...where you are also the murderer.", e:"🔍"},
  {s:"There are only 10 types of people.", p:"Those who understand binary, and those who don't.", e:"🔢"},
  {s:"Why do Java developers wear glasses?", p:"Because they can't C#.", e:"👓"},
  {s:"I asked AI to write me a poem.", p:'It said "roses are #FF0000, violets are #0000FF."', e:"🌹"},
  {s:"How do trees access the internet?", p:"They log in.", e:"🌳"},
];

let idx = 0;
const INTERVAL = 12000;

function showJoke() {
  const joke = jokes[idx % jokes.length];
  const container = document.getElementById('joke');
  container.innerHTML = `
    <div class="setup">${joke.s}</div>
    <div class="punchline">${joke.p}</div>
    <div class="emoji">${joke.e}</div>
  `;
  const bar = document.getElementById('progress');
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = `fillBar ${INTERVAL/1000}s linear forwards`;
  document.getElementById('counter').textContent = `${(idx % jokes.length) + 1} / ${jokes.length}`;
  idx++;
}

showJoke();
setInterval(showJoke, INTERVAL);
</script>
</body>
</html>
